<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tłumacz">
  <meta name="theme-color" content="#0a0a0a">
  <title>Tłumacz</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Tłumacz</h1>
      <button id="settings-btn" aria-label="Ustawienia">⚙️</button>
    </header>

    <section class="panel" data-panel="A">
      <div class="panel-top">
        <select class="lang-select" data-panel="A">
          <option value="pl">🇵🇱 Polski</option>
          <option value="en">🇬🇧 Angielski</option>
          <option value="es">🇪🇸 Hiszpański</option>
        </select>
        <div class="panel-actions">
          <button class="play-btn" data-panel="A" aria-label="Odtwórz" disabled>🔊</button>
          <button class="copy-btn" data-panel="A" aria-label="Kopiuj" disabled>📋</button>
          <button class="paste-btn" data-panel="A" aria-label="Wklej">📥</button>
          <button class="clear-btn" data-panel="A" aria-label="Wyczyść">✕</button>
        </div>
      </div>
      <textarea class="panel-text" data-panel="A" placeholder="Mów lub pisz tutaj..." rows="4"></textarea>
      <div class="panel-bottom">
        <button class="mic-btn" data-panel="A" aria-label="Nagrywaj">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
          <span>Przytrzymaj i mów</span>
        </button>
        <button class="send-btn" data-panel="A">Tłumacz ↓</button>
      </div>
      <div class="status" data-panel="A"></div>
    </section>

    <div class="divider">
      <button id="swap-btn" aria-label="Zamień języki">⇅</button>
    </div>

    <section class="panel" data-panel="B">
      <div class="panel-top">
        <select class="lang-select" data-panel="B">
          <option value="pl">🇵🇱 Polski</option>
          <option value="en" selected>🇬🇧 Angielski</option>
          <option value="es">🇪🇸 Hiszpański</option>
        </select>
        <div class="panel-actions">
          <button class="play-btn" data-panel="B" aria-label="Odtwórz" disabled>🔊</button>
          <button class="copy-btn" data-panel="B" aria-label="Kopiuj" disabled>📋</button>
          <button class="paste-btn" data-panel="B" aria-label="Wklej">📥</button>
          <button class="clear-btn" data-panel="B" aria-label="Wyczyść">✕</button>
        </div>
      </div>
      <textarea class="panel-text" data-panel="B" placeholder="Mów lub pisz tutaj..." rows="4"></textarea>
      <div class="panel-bottom">
        <button class="mic-btn" data-panel="B" aria-label="Nagrywaj">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
          <span>Przytrzymaj i mów</span>
        </button>
        <button class="send-btn" data-panel="B">Tłumacz ↑</button>
      </div>
      <div class="status" data-panel="B"></div>
    </section>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Ustawienia</h2>
      <label for="api-key">Klucz OpenAI API:</label>
      <input type="password" id="api-key" placeholder="sk-proj-...">
      <p class="hint">Klucz zapisany tylko w tej przeglądarce (localStorage). Nie opuszcza Twojego telefonu — idzie tylko bezpośrednio do OpenAI API.</p>

      <label for="voice">Głos TTS:</label>
      <select id="voice">
        <option value="nova">Nova (kobiecy, naturalny)</option>
        <option value="alloy">Alloy (neutralny)</option>
        <option value="echo">Echo (męski)</option>
        <option value="shimmer">Shimmer (kobiecy, ciepły)</option>
        <option value="onyx">Onyx (męski, głęboki)</option>
        <option value="fable">Fable (brytyjski)</option>
      </select>

      <label>
        <input type="checkbox" id="autoplay"> Automatycznie odtwarzaj tłumaczenie
      </label>

      <div class="modal-actions">
        <button id="save-settings">Zapisz</button>
        <button id="close-settings" class="secondary">Anuluj</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
